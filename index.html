<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#07080d">
<title>WORKDROP</title>
<style>
  :root{
    --bg:#07080d;--bg2:#10131f;--card:#141826;--card2:#1b2032;
    --line:#262d44;--text:#f2f5ff;--muted:#8b93b5;
    --jakob:#2dd4ff;--paul:#ff7a3d;--gold:#ffd23f;--green:#2ee6a6;
    --safe-top:env(safe-area-inset-top,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;}
  body{display:flex;flex-direction:column;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--text);padding-top:var(--safe-top);}
  #app{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;background:var(--bg);padding:0 16px 48px;}
  .wrap{max-width:600px;margin:auto;width:100%;}

  header{padding:26px 0 4px;text-align:center;}
  h1{font-size:46px;font-weight:900;letter-spacing:3px;font-style:italic;
    background:linear-gradient(90deg,var(--jakob),#fff 50%,var(--paul));
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  .sub{color:var(--muted);font-size:14px;margin-top:6px;letter-spacing:.3px;}

  .tabs{display:flex;gap:6px;background:var(--bg2);border:1px solid var(--line);padding:6px;border-radius:14px;margin:18px 0;}
  .tab{flex:1;text-align:center;padding:14px 0;border-radius:10px;font-weight:800;font-size:15px;letter-spacing:.5px;color:var(--muted);cursor:pointer;transition:.15s;text-transform:uppercase;}
  .tab.active{background:var(--card2);color:var(--text);}
  .page{display:none;}.page.active{display:block;}

  /* ---- Block 1: Duell ---- */
  .duel{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px 20px;margin-bottom:16px;}
  .duel-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;}
  .duel-side{display:flex;flex-direction:column;gap:4px;}
  .duel-side.p{align-items:flex-end;}
  .dn{font-size:16px;font-weight:800;color:var(--muted);display:flex;align-items:center;gap:6px;}
  .dn .crown{font-size:18px;}
  .dv{font-size:48px;font-weight:900;line-height:1;}
  .dv small{font-size:20px;font-weight:700;opacity:.65;}
  .duel-side.j .dv{color:var(--jakob);}
  .duel-side.p .dv{color:var(--paul);}

  .tug{height:20px;border-radius:10px;overflow:hidden;display:flex;border:1px solid var(--line);position:relative;background:#0a0c14;}
  .tug .tj{background:var(--jakob);transition:width .6s cubic-bezier(.4,1.3,.5,1);}
  .tug .tp{background:var(--paul);transition:width .6s cubic-bezier(.4,1.3,.5,1);}
  .tug .knob{position:absolute;top:-3px;width:4px;height:26px;background:#fff;border-radius:2px;transform:translateX(-50%);transition:left .6s cubic-bezier(.4,1.3,.5,1);}

  .duel-status{text-align:center;font-size:16px;font-weight:800;margin-top:16px;}
  .duel-status .g{color:var(--gold);}
  .duel-hint{text-align:center;font-size:13px;color:var(--muted);margin-top:6px;}

  /* ---- Block 2: Fortschritt ---- */
  .stat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:12px;}
  .stat-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;}
  .snm{font-weight:800;font-size:18px;}
  .snm .dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:7px;}
  .spct{font-size:13px;color:var(--muted);font-weight:700;}
  .bar{height:12px;background:#0a0c14;border-radius:6px;overflow:hidden;}
  .fill{height:100%;border-radius:6px;transition:width .5s ease;}
  .fill.j{background:var(--jakob);}
  .fill.p{background:var(--paul);}
  .smeta{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-top:12px;}
  .earned{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;}
  .chip{font-size:12px;font-weight:800;padding:6px 11px;border-radius:20px;color:#0a0c14;background:var(--gold);}
  .payout{width:100%;margin-top:14px;background:transparent;color:var(--green);border:1px solid rgba(46,230,166,.35);border-radius:11px;padding:14px;font-weight:800;font-size:14px;cursor:pointer;}

  /* ---- Block 3: Eintragen ---- */
  .section-title{font-size:13px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin:26px 0 14px;font-weight:800;}
  .pickq{color:var(--muted);font-size:14px;margin-bottom:12px;font-weight:700;}
  .pick{display:flex;gap:12px;}
  .pickbtn{flex:1;border:none;border-radius:18px;padding:38px 8px;font-size:24px;font-weight:900;color:#fff;cursor:pointer;transition:.12s;display:flex;flex-direction:column;align-items:center;gap:10px;}
  .pickbtn:active{transform:scale(.96);}
  .pickbtn .av{font-size:48px;line-height:1;}
  .pickbtn.j{background:var(--jakob);color:#06222b;}
  .pickbtn.p{background:var(--paul);color:#2b1206;}
  .step2{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;}
  .s2head{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .back{background:#0e1322;border:1px solid var(--line);color:var(--text);border-radius:11px;padding:12px 16px;font-weight:800;cursor:pointer;font-size:18px;}
  .s2who{font-weight:900;font-size:19px;display:flex;align-items:center;gap:8px;}
  .s2who .dot{width:12px;height:12px;border-radius:50%;display:inline-block;}
  .btns{display:flex;gap:12px;}
  .bigbtn{flex:1;border:none;border-radius:16px;padding:26px 8px;font-size:18px;font-weight:900;color:#fff;cursor:pointer;line-height:1.25;}
  .bigbtn:active{transform:scale(.96);}
  .bigbtn span{display:block;font-size:14px;font-weight:600;opacity:.85;margin-top:6px;}
  .horse{background:#5a6b8c;}
  .egg{background:#b8862f;}

  /* ---- Verlauf / Archiv ---- */
  .row{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
  .row .l{display:flex;flex-direction:column;gap:3px;}
  .row .t{font-weight:800;}.row .t .dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:6px;}
  .row .d{font-size:12px;color:var(--muted);}
  .row .amt{font-weight:900;margin-right:10px;}
  .del{background:#2a1622;color:#ff6b81;border:1px solid #5a2638;border-radius:9px;padding:9px 12px;font-weight:800;cursor:pointer;}
  .archmonth{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:10px;}
  .archmonth h3{margin:0 0 10px;font-size:16px;}
  .archline{display:flex;justify-content:space-between;padding:6px 0;font-size:15px;}
  .win-a{color:var(--gold);font-weight:800;}
  .empty{color:var(--muted);text-align:center;padding:30px 0;font-size:14px;}

  #overlay{position:fixed;inset:0;background:rgba(5,6,11,.7);display:none;align-items:center;justify-content:center;z-index:50;flex-direction:column;gap:14px;}
  #overlay.show{display:flex;}
  .spin{width:44px;height:44px;border:4px solid #2a3252;border-top-color:var(--jakob);border-radius:50%;animation:rot .8s linear infinite;}
  @keyframes rot{to{transform:rotate(360deg);}}
  .spin-label{color:var(--muted);font-size:13px;font-weight:700;}
  #toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(80px);background:#1e2438;border:1px solid var(--line);color:var(--text);padding:13px 20px;border-radius:12px;font-weight:800;font-size:15px;z-index:60;transition:.3s;opacity:0;}
  #toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
  .conf{position:fixed;top:-10px;width:10px;height:14px;z-index:70;pointer-events:none;}
</style>
</head>
<body>
<div id="app"><div class="wrap">
  <header><h1>WORKDROP</h1><div class="sub" id="monthLabel">&nbsp;</div></header>
  <div class="tabs">
    <div class="tab active" data-page="comp">Duell</div>
    <div class="tab" data-page="hist">Verlauf</div>
    <div class="tab" data-page="arch">Archiv</div>
  </div>
  <div class="page active" id="comp">
    <div class="duel" id="duel"></div>
    <div id="stats"></div>
    <div class="section-title">Arbeit eintragen</div>
    <div id="entry"></div>
  </div>
  <div class="page" id="hist"><div class="section-title">Diesen Monat</div><div id="histList"></div></div>
  <div class="page" id="arch"><div class="section-title">Vergangene Monate</div><div id="archList"></div></div>
</div></div>
<div id="overlay"><div class="spin"></div><div class="spin-label">Laden…</div></div>
<div id="toast"></div>
<script>
var API='https://script.google.com/macros/s/AKfycbwH1MSZADFzvwdVYHfrD5eHpxEz2nzEurzW7UHjSB8axMH6xmGd-_J2V7cYBp1IRF3BxA/exec';
var DATA=null,selected=null,cbCount=0;
var COLORS={Jakob:'var(--jakob)',Paul:'var(--paul)'};
var AVATAR={Jakob:'👨‍🌾',Paul:'🧑‍🌾'};

function $(id){return document.getElementById(id);}
function showOverlay(){$('overlay').classList.add('show');}
function hideOverlay(){$('overlay').classList.remove('show');}
function toast(msg){var t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}

document.querySelectorAll('.tab').forEach(function(tab){
  tab.addEventListener('click',function(){
    document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
    document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
    tab.classList.add('active');
    $(tab.dataset.page).classList.add('active');
  });
});

function jsonp(params,callback){
  var cbName='wd_cb_'+(++cbCount);
  var timer=setTimeout(function(){
    delete window[cbName];
    var s=document.getElementById(cbName);if(s)s.remove();
    callback(null);
  },15000);
  window[cbName]=function(data){
    clearTimeout(timer);delete window[cbName];
    var s=document.getElementById(cbName);if(s)s.remove();
    callback(data);
  };
  params.callback=cbName;
  var qs=Object.keys(params).map(function(k){return encodeURIComponent(k)+'='+encodeURIComponent(params[k]);}).join('&');
  var s=document.createElement('script');
  s.id=cbName;s.src=API+'?'+qs;
  s.onerror=function(){clearTimeout(timer);delete window[cbName];s.remove();callback(null);};
  document.head.appendChild(s);
}

function api(params,onSuccess){
  jsonp(params,function(data){
    if(!data){hideOverlay();toast('Fehler beim Laden');return;}
    onSuccess(data);
  });
}

function load(){showOverlay();api({action:'data'},function(d){DATA=d;render();hideOverlay();});}
function addEntry(name,type){
  showOverlay();
  api({action:'addEntry',name:name,type:type},function(d){DATA=d;selected=null;render();hideOverlay();confetti();toast(name+': +'+(type==='Pferdestall'?5:3)+' €');});
}
function delEntry(id){
  if(!confirm('Diesen Eintrag wirklich löschen?'))return;
  showOverlay();
  api({action:'deleteEntry',id:id},function(d){DATA=d;render();hideOverlay();toast('Gelöscht');});
}
function payout(name){
  if(!confirm('Auszahlung für '+name+' beantragen?'))return;
  showOverlay();
  api({action:'payout',name:name},function(d){DATA=d;render();hideOverlay();toast('Auszahlung beantragt');});
}
function pickPerson(name){selected=name;renderEntry();}
function clearPick(){selected=null;renderEntry();}

function monthName(key){
  var m=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  var p=key.split('-');return m[parseInt(p[1],10)-1]+' '+p[0];
}

function renderDuel(){
  var j=DATA.spieler[0],p=DATA.spieler[1];
  if(DATA.spieler[0].name!=='Jakob'){j=DATA.spieler[1];p=DATA.spieler[0];}
  var total=j.verdienst+p.verdienst,jp=total>0?(j.verdienst/total*100):50;
  var html=''+
    '<div class="duel-top">'+
      '<div class="duel-side j"><div class="dn">'+j.name+(j.fuehrt?' <span class="crown">👑</span>':'')+'</div><div class="dv">'+j.verdienst+'<small> €</small></div></div>'+
      '<div class="duel-side p"><div class="dn">'+(p.fuehrt?'<span class="crown">👑</span> ':'')+p.name+'</div><div class="dv">'+p.verdienst+'<small> €</small></div></div>'+
    '</div>'+
    '<div class="tug"><div class="tj" style="width:'+jp+'%"></div><div class="tp" style="width:'+(100-jp)+'%"></div><div class="knob" style="left:'+jp+'%"></div></div>';
  var status,hint='';
  if(total===0){status='Noch kein Eintrag – los geht\'s!';}
  else if(j.verdienst===p.verdienst){status='<span class="g">Gleichstand</span> · '+j.verdienst+' € : '+p.verdienst+' €';}
  else{
    var f=j.verdienst>p.verdienst?j:p, t=j.verdienst>p.verdienst?p:j, diff=f.verdienst-t.verdienst;
    status='<span class="g">'+f.name+' führt</span> · '+diff+' € Vorsprung';
    var kisten=Math.ceil(diff/3);
    hint=t.name+': noch '+(kisten===1?'1 Kiste Eier':kisten+' Kisten Eier')+' zum Aufholen';
  }
  html+='<div class="duel-status">'+status+'</div>';
  if(hint)html+='<div class="duel-hint">'+hint+'</div>';
  $('duel').innerHTML=html;
}

function renderStats(){
  var html='';
  DATA.spieler.forEach(function(s){
    var cls=s.name==='Jakob'?'j':'p';
    var col=COLORS[s.name];
    var pct=Math.min(100,Math.round(s.verdienst/DATA.monatsziel*100));
    var earned='';
    var labels={'20':'20 €','40':'40 €','ziel':'Ziel erreicht!','streak':'🔥 Streak'};
    var chips=s.badges.filter(function(b){return labels[b];}).map(function(b){return '<span class="chip">'+labels[b]+'</span>';}).join('');
    if(chips)earned='<div class="earned">'+chips+'</div>';
    html+='<div class="stat">'+
      '<div class="stat-top"><span class="snm"><span class="dot" style="background:'+col+'"></span>'+s.name+'</span><span class="spct">'+pct+'% vom Ziel · '+DATA.monatsziel+' €</span></div>'+
      '<div class="bar"><div class="fill '+cls+'" style="width:'+pct+'%"></div></div>'+
      '<div class="smeta"><span>'+s.eier+'× Eier · '+s.pferdestall+'× Stall</span><span>'+(s.streak>0?'🔥 '+(s.streak===1?'1 Tag':s.streak+' Tage'):'kein Streak')+'</span></div>'+
      earned+
      '<button class="payout" onclick="payout(\''+s.name+'\')">Auszahlung beantragen</button>'+
    '</div>';
  });
  $('stats').innerHTML=html;
}

function renderEntry(){
  if(!selected){
    $('entry').innerHTML='<div class="pickq">1. Wer hat gearbeitet?</div><div class="pick"><button class="pickbtn j" onclick="pickPerson(\'Jakob\')"><span class="av">'+AVATAR['Jakob']+'</span>Jakob</button><button class="pickbtn p" onclick="pickPerson(\'Paul\')"><span class="av">'+AVATAR['Paul']+'</span>Paul</button></div>';
  } else {
    var col=COLORS[selected];
    $('entry').innerHTML='<div class="step2"><div class="s2head"><button class="back" onclick="clearPick()">←</button><span class="s2who"><span class="dot" style="background:'+col+'"></span>'+selected+' – welche Arbeit?</span></div><div class="btns"><button class="bigbtn horse" onclick="addEntry(\''+selected+'\',\'Pferdestall\')">🐴 Pferdestall<span>+5 €</span></button><button class="bigbtn egg" onclick="addEntry(\''+selected+'\',\'Eier\')">🥚 Eier abpacken<span>+3 € / Kiste</span></button></div></div>';
  }
}

function render(){
  if(!DATA)return;
  $('monthLabel').textContent=monthName(DATA.aktuellerMonat)+' · Ziel '+DATA.monatsziel+' €';
  renderDuel();renderStats();renderEntry();
  $('histList').innerHTML=DATA.verlauf.length===0?'<div class="empty">Noch keine Einträge diesen Monat.</div>':DATA.verlauf.map(function(e){var col=COLORS[e.name]||'var(--jakob)';return '<div class="row"><div class="l"><span class="t"><span class="dot" style="background:'+col+'"></span>'+e.name+' · '+e.typ+'</span><span class="d">'+e.datum+'</span></div><div style="display:flex;align-items:center"><span class="amt">'+e.betrag+' €</span><button class="del" onclick="delEntry(\''+e.id+'\')">Löschen</button></div></div>';}).join('');
  $('archList').innerHTML=DATA.archiv.length===0?'<div class="empty">Noch kein abgeschlossener Monat.</div>':DATA.archiv.map(function(m){var lines=m.spieler.map(function(s){var w=s.name===m.gewinner;return '<div class="archline '+(w?'win-a':'')+'"><span>'+(w?'👑 ':'')+s.name+'</span><span>'+s.verdienst+' €</span></div>';}).join('');return '<div class="archmonth"><h3>'+monthName(m.monat)+'</h3>'+lines+'</div>';}).join('');
}

function confetti(){
  var colors=['#2dd4ff','#ff7a3d','#ffd23f','#2ee6a6'];
  for(var i=0;i<70;i++){(function(){var c=document.createElement('div');c.className='conf';c.style.left=Math.random()*100+'vw';c.style.background=colors[Math.floor(Math.random()*colors.length)];c.style.transform='rotate('+(Math.random()*360)+'deg)';if(Math.random()>.5)c.style.borderRadius='50%';document.body.appendChild(c);var dur=1500+Math.random()*1600,drift=(Math.random()*220-110);var anim=c.animate([{transform:'translate(0,0) rotate(0deg)',opacity:1},{transform:'translate('+drift+'px,'+(window.innerHeight+40)+'px) rotate(760deg)',opacity:1}],{duration:dur,easing:'cubic-bezier(.3,.6,.7,1)'});anim.onfinish=function(){c.remove();};})();}
}
load();
</script>
</body>
</html>
