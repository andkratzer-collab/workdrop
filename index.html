<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#07080d">
<title>WORKDROP</title>
<style>
  :root{
    --bg:#07080d;--bg2:#10131f;--card:#161a2b;--card2:#1e2438;
    --line:#2a3252;--text:#f2f5ff;--muted:#8b93b5;
    --jakob:#2dd4ff;--jakob2:#3b6bff;--paul:#ff7a3d;--paul2:#ff3d8b;
    --gold:#ffd23f;--green:#2ee6a6;
    --safe-top:env(safe-area-inset-top,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;}
  body{display:flex;flex-direction:column;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--text);padding-top:var(--safe-top);}
  #app{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;
    background:radial-gradient(900px 420px at 12% -8%,rgba(45,212,255,.10),transparent 60%),radial-gradient(900px 420px at 88% -8%,rgba(255,61,139,.10),transparent 60%),var(--bg);
    padding:0 16px 48px;}
  .wrap{max-width:600px;margin:auto;width:100%;}
  header{padding:24px 0 8px;text-align:center;}
  h1{font-size:50px;font-weight:900;letter-spacing:4px;font-style:italic;
    background:linear-gradient(90deg,var(--jakob),#fff 50%,var(--paul));
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  .sub{color:var(--muted);font-size:14px;margin-top:4px;letter-spacing:.5px;}
  .tabs{display:flex;gap:6px;background:var(--bg2);border:1px solid var(--line);padding:6px;border-radius:16px;margin:16px 0;}
  .tab{flex:1;text-align:center;padding:15px 0;border-radius:11px;font-weight:800;font-size:15px;letter-spacing:.5px;color:var(--muted);cursor:pointer;transition:.15s;text-transform:uppercase;}
  .tab.active{background:var(--card2);color:var(--text);}
  .page{display:none;}.page.active{display:block;}
  .battle{position:relative;display:flex;align-items:stretch;border-radius:20px;overflow:hidden;border:1px solid var(--line);margin-bottom:16px;min-height:160px;}
  .side{flex:1;padding:22px 18px;display:flex;flex-direction:column;justify-content:center;}
  .side.j{background:linear-gradient(135deg,rgba(45,212,255,.16),rgba(59,107,255,.04));}
  .side.p{background:linear-gradient(225deg,rgba(255,61,139,.16),rgba(255,122,61,.04));text-align:right;}
  .side.win.j{background:linear-gradient(135deg,rgba(45,212,255,.34),rgba(59,107,255,.10));box-shadow:inset 0 0 40px rgba(45,212,255,.25);}
  .side.win.p{background:linear-gradient(225deg,rgba(255,61,139,.34),rgba(255,122,61,.10));box-shadow:inset 0 0 40px rgba(255,61,139,.25);}
  .sname{font-size:18px;font-weight:800;display:flex;align-items:center;gap:6px;}
  .side.p .sname{justify-content:flex-end;}
  .sval{font-size:54px;font-weight:900;line-height:1;margin-top:8px;}
  .side.j .sval{color:var(--jakob);}.side.p .sval{color:var(--paul);}
  .sval small{font-size:20px;font-weight:700;opacity:.7;}
  .crown{font-size:24px;animation:bob 1.6s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  .vs{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:62px;height:62px;border-radius:50%;background:var(--bg);border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-weight:900;font-style:italic;font-size:20px;z-index:2;}
  .tug-wrap{margin-bottom:14px;}
  .tug{height:26px;border-radius:11px;overflow:hidden;display:flex;border:1px solid var(--line);position:relative;background:#0a0c14;}
  .tug .tj{background:linear-gradient(90deg,var(--jakob2),var(--jakob));transition:width .6s cubic-bezier(.4,1.3,.5,1);}
  .tug .tp{background:linear-gradient(90deg,var(--paul),var(--paul2));transition:width .6s cubic-bezier(.4,1.3,.5,1);}
  .tug .knob{position:absolute;top:-4px;width:4px;height:34px;background:#fff;border-radius:2px;transform:translateX(-50%);transition:left .6s cubic-bezier(.4,1.3,.5,1);box-shadow:0 0 10px #fff;}
  .lead-line{text-align:center;font-size:15px;font-weight:800;margin-top:10px;}
  .lead-line .g{color:var(--gold);}
  .moti{background:linear-gradient(120deg,#161d36,#221931);border:1px solid var(--line);border-radius:16px;padding:16px 18px;margin:0 0 18px;font-size:16px;line-height:1.5;}
  .moti b{color:var(--gold);}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:14px;}
  .stat.j{border-left:4px solid var(--jakob);}.stat.p{border-left:4px solid var(--paul);}
  .stop{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .stop .nm{font-weight:800;font-size:19px;}.stop .pct{font-size:13px;color:var(--muted);font-weight:700;}
  .bar{height:12px;background:#0a0c14;border-radius:6px;overflow:hidden;}
  .fill{height:100%;border-radius:6px;transition:width .5s ease;}
  .fill.j{background:linear-gradient(90deg,var(--jakob2),var(--jakob));}
  .fill.p{background:linear-gradient(90deg,var(--paul),var(--paul2));}
  .meta{display:flex;justify-content:space-between;font-size:14px;color:var(--muted);margin-top:10px;}
  .badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:11px;}
  .badge{font-size:13px;font-weight:800;padding:7px 12px;border-radius:20px;background:#0e1322;border:1px solid var(--line);color:var(--muted);opacity:.55;}
  .badge.on{opacity:1;color:#0a0c14;background:linear-gradient(90deg,var(--gold),#ffe680);border-color:transparent;box-shadow:0 0 14px rgba(255,210,63,.35);}
  .payout{width:100%;margin-top:14px;background:transparent;color:var(--green);border:1px solid rgba(46,230,166,.4);border-radius:12px;padding:15px;font-weight:800;font-size:15px;cursor:pointer;}
  .section-title{font-size:14px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin:24px 0 12px;font-weight:800;}
  .pick{display:flex;gap:12px;}
  .pickbtn{flex:1;border:none;border-radius:20px;padding:40px 8px;font-size:26px;font-weight:900;color:#fff;cursor:pointer;transition:.12s;display:flex;flex-direction:column;align-items:center;gap:10px;}
  .pickbtn:active{transform:scale(.95);}
  .pickbtn .av{font-size:50px;line-height:1;}
  .pickbtn.j{background:linear-gradient(135deg,var(--jakob2),var(--jakob));box-shadow:0 8px 24px rgba(45,212,255,.25);}
  .pickbtn.p{background:linear-gradient(135deg,var(--paul),var(--paul2));box-shadow:0 8px 24px rgba(255,61,139,.25);}
  .step2{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;}
  .s2head{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .back{background:#0e1322;border:1px solid var(--line);color:var(--text);border-radius:11px;padding:12px 16px;font-weight:800;cursor:pointer;font-size:18px;}
  .s2who{font-weight:900;font-size:20px;display:flex;align-items:center;gap:8px;}
  .btns{display:flex;gap:10px;}
  .bigbtn{flex:1;border:none;border-radius:16px;padding:26px 8px;font-size:18px;font-weight:900;color:#fff;cursor:pointer;line-height:1.25;}
  .bigbtn:active{transform:scale(.95);}
  .bigbtn span{display:block;font-size:14px;font-weight:600;opacity:.85;margin-top:6px;}
  .horse{background:linear-gradient(135deg,#7c5cff,#3b6bff);}
  .egg{background:linear-gradient(135deg,#ffb13d,#ff6a3d);}
  .dot{width:11px;height:11px;border-radius:50%;display:inline-block;}
  .row{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
  .row .l{display:flex;flex-direction:column;gap:3px;}
  .row .t{font-weight:800;}.row .d{font-size:12px;color:var(--muted);}
  .row .amt{font-weight:900;margin-right:10px;}
  .del{background:#2a1622;color:#ff6b81;border:1px solid #5a2638;border-radius:9px;padding:8px 11px;font-weight:800;cursor:pointer;}
  .archmonth{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px;}
  .archmonth h3{margin:0 0 8px;font-size:16px;}
  .archline{display:flex;justify-content:space-between;padding:5px 0;font-size:14px;}
  .win-a{color:var(--gold);font-weight:800;}
  .empty{color:var(--muted);text-align:center;padding:30px 0;font-size:14px;}
  #overlay{position:fixed;inset:0;background:rgba(5,6,11,.7);display:none;align-items:center;justify-content:center;z-index:50;flex-direction:column;gap:14px;}
  #overlay.show{display:flex;}
  .spin{width:44px;height:44px;border:4px solid #2a3252;border-top-color:var(--jakob);border-radius:50%;animation:rot .8s linear infinite;}
  @keyframes rot{to{transform:rotate(360deg);}}
  .spin-label{color:var(--muted);font-size:13px;font-weight:700;}
  #toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(80px);background:#1e2438;border:1px solid var(--line);color:var(--text);padding:12px 18px;border-radius:12px;font-weight:800;font-size:14px;z-index:60;transition:.3s;opacity:0;}
  #toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
  .conf{position:fixed;top:-10px;width:10px;height:14px;z-index:70;pointer-events:none;}
</style>
</head>
<body>
<div id="app"><div class="wrap">
  <header><h1>WORKDROP</h1><div class="sub" id="monthLabel">&nbsp;</div></header>
  <div class="tabs">
    <div class="tab active" data-page="comp">Duell</div>
    <div class="tab" data-page="hist">Verlauf</div>
    <div class="tab" data-page="arch">Archiv</div>
  </div>
  <div class="page active" id="comp">
    <div id="battle"></div>
    <div class="tug-wrap"><div class="tug" id="tug"></div><div class="lead-line" id="leadLine"></div></div>
    <div class="moti" id="moti">&nbsp;</div>
    <div id="stats"></div>
    <div class="section-title">Arbeit eintragen</div>
    <div id="entry"></div>
  </div>
  <div class="page" id="hist"><div class="section-title">Diesen Monat</div><div id="histList"></div></div>
  <div class="page" id="arch"><div class="section-title">Vergangene Monate</div><div id="archList"></div></div>
</div></div>
<div id="overlay"><div class="spin"></div><div class="spin-label">Laden…</div></div>
<div id="toast"></div>
<script>
var API = 'https://script.google.com/macros/s/AKfycbwH1MSZADFzvwdVYHfrD5eHpxEz2nzEurzW7UHjSB8axMH6xmGd-_J2V7cYBp1IRF3BxA/exec';
var DATA=null, selected=null;
var COLORS={Jakob:'var(--jakob)',Paul:'var(--paul)'};
var AVATAR={Jakob:'👨‍🌾',Paul:'🧑‍🌾'};
var cbCount=0;

function $(id){return document.getElementById(id);}
function showOverlay(){$('overlay').classList.add('show');}
function hideOverlay(){$('overlay').classList.remove('show');}
function toast(msg){var t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}

document.querySelectorAll('.tab').forEach(function(tab){
  tab.addEventListener('click',function(){
    document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
    document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
    tab.classList.add('active');
    $(tab.dataset.page).classList.add('active');
  });
});

// JSONP: umgeht CORS komplett
function jsonp(params, callback) {
  var cbName = 'wd_cb_' + (++cbCount);
  var timeout = setTimeout(function(){
    delete window[cbName];
    var s = document.getElementById(cbName);
    if(s) s.remove();
    callback(null, new Error('Timeout'));
  }, 15000);

  window[cbName] = function(data){
    clearTimeout(timeout);
    delete window[cbName];
    var s = document.getElementById(cbName);
    if(s) s.remove();
    callback(data);
  };

  params.callback = cbName;
  var qs = Object.keys(params).map(function(k){
    return encodeURIComponent(k)+'='+encodeURIComponent(params[k]);
  }).join('&');

  var s = document.createElement('script');
  s.id = cbName;
  s.src = API + '?' + qs;
  s.onerror = function(){
    clearTimeout(timeout);
    delete window[cbName];
    s.remove();
    callback(null, new Error('Script error'));
  };
  document.head.appendChild(s);
}

function api(params, onSuccess) {
  jsonp(params, function(data, err){
    if(err || !data){ hideOverlay(); toast('Fehler beim Laden'); return; }
    onSuccess(data);
  });
}

function load(){
  showOverlay();
  api({action:'data'}, function(d){ DATA=d; render(); hideOverlay(); });
}
function addEntry(name,type){
  showOverlay();
  api({action:'addEntry',name:name,type:type}, function(d){
    DATA=d; selected=null; render(); hideOverlay(); confetti();
    toast(name+': +'+(type==='Pferdestall'?5:3)+' €');
  });
}
function delEntry(id){
  if(!confirm('Diesen Eintrag wirklich löschen?'))return;
  showOverlay();
  api({action:'deleteEntry',id:id}, function(d){ DATA=d; render(); hideOverlay(); toast('Gelöscht'); });
}
function payout(name){
  if(!confirm('Auszahlung für '+name+' beantragen?'))return;
  showOverlay();
  api({action:'payout',name:name}, function(d){ DATA=d; render(); hideOverlay(); toast('Auszahlung beantragt'); });
}
function pickPerson(name){selected=name;renderEntry();}
function clearPick(){selected=null;renderEntry();}

function monthName(key){
  var m=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  var p=key.split('-');return m[parseInt(p[1],10)-1]+' '+p[0];
}
function renderBattle(){
  var j=DATA.spieler[0],p=DATA.spieler[1];
  if(DATA.spieler[0].name!=='Jakob'){j=DATA.spieler[1];p=DATA.spieler[0];}
  $('battle').innerHTML=
    '<div class="side j '+(j.fuehrt?'win':'')+'">'+
      '<div class="sname">'+j.name+(j.fuehrt?' <span class="crown">👑</span>':'')+' </div>'+
      '<div class="sval">'+j.verdienst+'<small> €</small></div></div>'+
    '<div class="vs">VS</div>'+
    '<div class="side p '+(p.fuehrt?'win':'')+'">'+
      '<div class="sname">'+(p.fuehrt?'<span class="crown">👑</span> ':'')+p.name+'</div>'+
      '<div class="sval">'+p.verdienst+'<small> €</small></div></div>';
  var total=j.verdienst+p.verdienst,jp=total>0?(j.verdienst/total*100):50;
  $('tug').innerHTML='<div class="tj" style="width:'+jp+'%"></div><div class="tp" style="width:'+(100-jp)+'%"></div><div class="knob" style="left:'+jp+'%"></div>';
  var ll=$('leadLine');
  if(j.verdienst===p.verdienst){ll.innerHTML=total===0?'Noch unentschieden – leg los!':'<span class="g">Gleichstand!</span> '+j.verdienst+' € : '+p.verdienst+' €';}
  else{var f=j.verdienst>p.verdienst?j:p;ll.innerHTML='<span class="g">'+f.name+' führt</span> mit '+Math.abs(j.verdienst-p.verdienst)+' € Vorsprung';}
}
function renderStats(){
  var html='';
  DATA.spieler.forEach(function(s){
    var cls=s.name==='Jakob'?'j':'p';
    var pct=Math.min(100,Math.round(s.verdienst/DATA.monatsziel*100));
    var bd=[{key:'20',label:'20 €'},{key:'40',label:'40 €'},{key:'streak',label:(s.streak===1?'1 Tag':s.streak+' Tage')},{key:'ziel',label:'Ziel!'}];
    var badges=bd.map(function(b){var on=s.badges.indexOf(b.key)!==-1;return '<div class="badge '+(on?'on':'')+'">'+( on?'★ ':'')+b.label+'</div>';}).join('');
    html+='<div class="stat '+cls+'"><div class="stop"><span class="nm">'+s.name+'</span><span class="pct">'+pct+'% vom Ziel ('+DATA.monatsziel+' €)</span></div>'+
      '<div class="bar"><div class="fill '+cls+'" style="width:'+pct+'%"></div></div>'+
      '<div class="meta"><span>'+s.pferdestall+'x Stall · '+s.eier+'x Eier</span><span>'+(s.streak>0?'🔥 '+(s.streak===1?'1 Tag':s.streak+' Tage')+' Streak':'kein Streak')+'</span></div>'+
      '<div class="badges">'+badges+'</div>'+
      '<button class="payout" onclick="payout(\''+s.name+'\')">Auszahlung beantragen</button></div>';
  });
  $('stats').innerHTML=html;
}
function renderEntry(){
  if(!selected){
    $('entry').innerHTML='<div style="color:var(--muted);font-size:13px;margin-bottom:10px;font-weight:700;">1. Wer hat gearbeitet?</div>'+
      '<div class="pick">'+
        '<button class="pickbtn j" onclick="pickPerson(\'Jakob\')"><span class="av">'+AVATAR['Jakob']+'</span>Jakob</button>'+
        '<button class="pickbtn p" onclick="pickPerson(\'Paul\')"><span class="av">'+AVATAR['Paul']+'</span>Paul</button>'+
      '</div>';
  } else {
    var col=COLORS[selected];
    $('entry').innerHTML='<div class="step2"><div class="s2head"><button class="back" onclick="clearPick()">←</button>'+
      '<span class="s2who"><span class="dot" style="background:'+col+'"></span>'+selected+' – welche Arbeit?</span></div>'+
      '<div class="btns">'+
        '<button class="bigbtn horse" onclick="addEntry(\''+selected+'\',\'Pferdestall\')">🐴 Pferdestall<span>+5 €</span></button>'+
        '<button class="bigbtn egg" onclick="addEntry(\''+selected+'\',\'Eier\')">🥚 Eier abpacken<span>+3 € / Kiste</span></button>'+
      '</div></div>';
  }
}
function render(){
  if(!DATA)return;
  $('monthLabel').textContent=monthName(DATA.aktuellerMonat)+' · Ziel '+DATA.monatsziel+' €';
  renderBattle();renderStats();
  $('moti').innerHTML=DATA.motivation.replace(/(\d+ €)/g,'<b>$1</b>');
  renderEntry();
  $('histList').innerHTML=DATA.verlauf.length===0?'<div class="empty">Noch keine Einträge diesen Monat.</div>':
    DATA.verlauf.map(function(e){var col=COLORS[e.name]||'var(--jakob)';
      return '<div class="row"><div class="l"><span class="t"><span class="dot" style="background:'+col+';margin-right:6px"></span>'+e.name+' · '+e.typ+'</span><span class="d">'+e.datum+'</span></div>'+
        '<div style="display:flex;align-items:center"><span class="amt">'+e.betrag+' €</span><button class="del" onclick="delEntry(\''+e.id+'\')">Löschen</button></div></div>';
    }).join('');
  $('archList').innerHTML=DATA.archiv.length===0?'<div class="empty">Noch kein abgeschlossener Monat.</div>':
    DATA.archiv.map(function(m){
      var lines=m.spieler.map(function(s){var w=s.name===m.gewinner;return '<div class="archline '+(w?'win-a':'')+'"><span>'+(w?'👑 ':'')+s.name+'</span><span>'+s.verdienst+' €</span></div>';}).join('');
      return '<div class="archmonth"><h3>'+monthName(m.monat)+'</h3>'+lines+'</div>';
    }).join('');
}
function confetti(){
  var colors=['#2dd4ff','#3b6bff','#ff7a3d','#ff3d8b','#ffd23f','#2ee6a6'];
  for(var i=0;i<80;i++){(function(){
    var c=document.createElement('div');c.className='conf';
    c.style.left=Math.random()*100+'vw';c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.transform='rotate('+(Math.random()*360)+'deg)';if(Math.random()>.5)c.style.borderRadius='50%';
    document.body.appendChild(c);
    var dur=1500+Math.random()*1600,drift=(Math.random()*220-110);
    var anim=c.animate([{transform:'translate(0,0) rotate(0deg)',opacity:1},{transform:'translate('+drift+'px,'+(window.innerHeight+40)+'px) rotate(760deg)',opacity:1}],{duration:dur,easing:'cubic-bezier(.3,.6,.7,1)'});
    anim.onfinish=function(){c.remove();};
  })();}
}
load();
</script>
</body>
</html>
